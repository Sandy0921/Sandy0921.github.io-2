<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 花園種花</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #C8E6C9 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .game-container {
    background: rgba(255,255,255,0.92);
    border-radius: 32px;
    padding: 28px 24px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
  }
  h1 { font-size: 2rem; color: #2E7D32; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 16px; font-size: 0.95rem; }
  .stats {
    background: #E8F5E9; border-radius: 16px; padding: 10px 18px;
    margin-bottom: 16px; display: flex; justify-content: space-around;
    font-weight: bold; color: #2E7D32; font-size: 1.05rem;
  }
  .stats span { color: #333; }
  .garden {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 16px;
  }
  .plot {
    aspect-ratio: 1;
    background: #8D6E63;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: inset 0 -8px 0 #5D4037;
    position: relative;
    overflow: hidden;
    padding: 8px;
  }
  .plot.empty { background: #A1887F; box-shadow: inset 0 -8px 0 #6D4C41; }
  .plot.empty:hover { transform: scale(1.04); background: #BCAAA4; }
  .plot .plant {
    font-size: 2.8rem;
    transition: all 0.4s ease;
    margin-bottom: 0;
    position: absolute;
    bottom: 10%;
  }
  .plot .water-drop {
    position: absolute;
    font-size: 1.6rem;
    opacity: 0;
    animation: none;
    top: 10%;
  }
  .plot.watering .water-drop {
    opacity: 1;
    animation: drop 0.8s ease forwards;
  }
  @keyframes drop {
    0% { transform: translateY(-20px); opacity: 1; }
    100% { transform: translateY(60px); opacity: 0; }
  }
  .plot .label {
    position: absolute;
    bottom: 6px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.7);
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .btn {
    background: linear-gradient(145deg, #66BB6A, #388E3C);
    color: #fff; border: none; padding: 12px 36px; border-radius: 50px;
    font-size: 1.1rem; font-weight: bold; cursor: pointer;
    transition: all 0.3s; box-shadow: 0 4px 15px rgba(56,142,60,0.4);
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(56,142,60,0.5); }
  .btn:active { transform: translateY(0); }
  .message { margin-top: 14px; font-size: 1.15rem; font-weight: bold; color: #2E7D32; min-height: 2em; }
  .reflection {
    background: #E8F5E9; border-radius: 16px; padding: 14px 18px;
    margin: 16px 0 0 0; text-align: left;
  }
  .reflection h3 {
    font-size: 0.95rem; color: #2E7D32; margin-bottom: 6px;
  }
  .reflection p {
    font-size: 0.85rem; color: #555; line-height: 1.6; margin: 0;
  }
  .game-footer {
    margin-top: 16px; font-size: 0.9rem; color: #888;
    border-top: 1px solid #eee; padding-top: 12px;
  }
  @media (max-width: 480px) {
    .game-container { padding: 16px 12px; }
    h1 { font-size: 1.5rem; }
    .garden { gap: 10px; }
    .plot .plant { font-size: 2.2rem; }
    .reflection { padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <h1>🌱 花園種花</h1>
  <p class="subtitle">點擊土盆 → 種種子 → 澆水 → 開花！</p>
  <div class="stats">
    <div>🌸 花朵 <span id="flowerCount">0</span></div>
    <div>💧 澆水 <span id="waterCount">0</span></div>
  </div>
  <div class="garden" id="garden"></div>
  <button class="btn" id="resetBtn">🔄 重新開始</button>
  <div class="message" id="message"></div>
  <div class="reflection">
    <h3>💭 遊戲心得</h3>
    <p>這個遊戲讓我體會到「耐心等待」的意義——從一粒種子到盛開的花朵，需要細心的澆水與照顧。程式就像種花一樣，每一步都不能跳過，每個階段都有它存在的必要。看著九宮格從一片泥土變成滿園花香，就像看著自己的程式碼從空白檔案長成一個完整的作品，成就感滿滿。</p>
  </div>
  <div class="game-footer">幼保三丙 81410346</div>
</div>
<script>
  const flowers = ['🌻','🌷','🌹','🌸','🌺','🌼','🌿','🌸','🌷','🌻','🌹','🌺'];
  const totalPlots = 9;
  let plots = [];
  let flowerCount = 0;
  let waterCount = 0;
  let hasWon = false;

  const stages = {
    empty: { emoji: '', label: '點擊種植', next: 'seed' },
    seed:  { emoji: '🌰', label: '澆水', next: 'sprout' },
    sprout:{ emoji: '🌱', label: '澆水', next: 'bud' },
    bud:   { emoji: '🌿', label: '澆水', next: 'flower' },
    flower:{ emoji: '🌸', label: '🌺', next: null }
  };

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    plots = Array(totalPlots).fill(null).map(() => ({ stage: 'empty', flowerEmoji: null }));
    flowerCount = 0;
    waterCount = 0;
    hasWon = false;
    document.getElementById('flowerCount').textContent = '0';
    document.getElementById('waterCount').textContent = '0';
    document.getElementById('message').textContent = '';
    const shuffled = shuffle([...flowers]);
    plots.forEach((p, i) => { p.flowerEmoji = shuffled[i % shuffled.length]; });
    renderGarden();
  }

  function renderGarden() {
    const garden = document.getElementById('garden');
    garden.innerHTML = '';
    plots.forEach((plot, index) => {
      const div = document.createElement('div');
      div.className = 'plot ' + plot.stage;
      div.dataset.index = index;

      const plant = document.createElement('div');
      plant.className = 'plant';

      const water = document.createElement('div');
      water.className = 'water-drop';
      water.textContent = '💧';

      const label = document.createElement('div');
      label.className = 'label';

      const s = stages[plot.stage];
      if (plot.stage === 'flower') {
        plant.textContent = plot.flowerEmoji;
        label.textContent = '✓';
      } else if (plot.stage === 'empty') {
        plant.textContent = '';
        label.textContent = '➕ 種花';
      } else {
        plant.textContent = s.emoji;
        label.textContent = s.label;
      }

      div.appendChild(plant);
      div.appendChild(water);
      div.appendChild(label);
      div.addEventListener('click', () => handlePlot(index));
      garden.appendChild(div);
    });
  }

  function handlePlot(index) {
    if (hasWon) return;
    const plot = plots[index];
    const el = document.querySelectorAll('.plot')[index];
    if (!el) return;

    if (plot.stage === 'empty') {
      plot.stage = 'seed';
      renderGarden();
      if (window.speak) { try { window.speak('seed planted'); } catch(e){} }
      return;
    }

    if (plot.stage === 'seed' || plot.stage === 'sprout' || plot.stage === 'bud') {
      waterCount++;
      document.getElementById('waterCount').textContent = waterCount;
      el.classList.add('watering');
      setTimeout(() => el.classList.remove('watering'), 900);
      const s = stages[plot.stage];
      plot.stage = s.next;
      setTimeout(() => {
        renderGarden();
        if (plot.stage === 'flower') {
          flowerCount++;
          document.getElementById('flowerCount').textContent = flowerCount;
          if (flowerCount === totalPlots) {
            hasWon = true;
            document.getElementById('message').textContent = '🎉 花園開滿花了！好美呀！ 🎉';
          }
        }
      }, 500);
      return;
    }

    if (plot.stage === 'flower') {
      document.getElementById('message').textContent = '已經開花了！';
      setTimeout(() => {
        if (!hasWon) document.getElementById('message').textContent = '';
      }, 1200);
    }
  }

  document.getElementById('resetBtn').addEventListener('click', initGame);
  initGame();
</script>
</body>
</html>
